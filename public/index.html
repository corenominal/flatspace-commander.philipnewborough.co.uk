<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Flatspace Commander — 2D vertical-scrolling space trader" />
  <title>FLATSPACE COMMANDER</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/css/style.css?v=1" />
</head>
<body>
  <div id="stage">
    <canvas id="game-canvas"></canvas>

    <div id="ui-layer" aria-live="polite">
      <!-- Station menus and HUD panels are injected here dynamically -->
    </div>
  </div>

  <script src="/js/vendor/howler.js"></script>
  <script src="/js/main.js?v=1" type="module"></script>
  <!-- Service Worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(registration => {
          // When the page becomes visible again (e.g. PWA resumed from background),
          // check for a newer SW so updates aren't missed between sessions.
          document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
              registration.update();
            }
          });
        });
      });
      // When a new SW takes control (after an update), reload to get fresh assets.
      // The firstSW guard prevents a reload on the very first install.
      const firstSW = !navigator.serviceWorker.controller;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!firstSW) {
          window.location.reload();
        }
      });
    }
  </script>
</body>
</html>
