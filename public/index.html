  <script src="/js/main.js?v=1775853268285" type="module"></script>
  <script defer src="js/metrics.js?v=1775317593465"></script>
  <!-- Service Worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(registration => {
          // When the page becomes visible again (e.g. PWA resumed from background),
          // check for a newer SW so updates aren't missed between sessions.
          document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
              registration.update();
            }
          });
        });
      });
      // When a new SW takes control (after an update), reload to get fresh assets.
      // The firstSW guard prevents a reload on the very first install.
      const firstSW = !navigator.serviceWorker.controller;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!firstSW) {
          window.location.reload();
        }
      });
    }
  </script>
</body>
